<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Failed - CarHub Connect</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0f1a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .failure-box {
            background: #0d1521;
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 20px;
            padding: 40px 32px;
            text-align: center;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            animation: shake 0.5s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }
        .error-icon {
            width: 72px;
            height: 72px;
            background: rgba(239, 68, 68, 0.08);
            border: 2px dashed #ef4444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px auto;
            color: #ef4444;
        }
        h3 {
            font-weight: 700;
            font-size: 20px;
            color: #ef4444;
            margin-bottom: 6px;
        }
        .reason-text {
            font-size: 13.5px;
            color: #94a3b8;
            margin-bottom: 24px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.06);
            margin: 20px 0;
            border: none;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 12px;
        }
        .detail-label {
            color: #64748b;
        }
        .detail-val {
            color: #cbd5e1;
            font-weight: 600;
        }
        .btn-retry {
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 700;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn-retry:hover {
            background: #dc2626;
            box-shadow: 0 6px 18px rgba(220, 38, 38, 0.4);
        }
        .btn-secondary {
            background: transparent;
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 10px;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s;
            margin-top: 10px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn-secondary:hover {
            color: #e2e8f0;
            background: rgba(255, 255, 255, 0.02);
            border-color: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

<div class="failure-box">
    <div class="error-icon">
        <i data-lucide="x-circle" style="width: 38px; height: 38px;"></i>
    </div>
    <h3>Payment Failed</h3>
    <p style="font-size: 12px; color: #64748b; margin-bottom: 20px;">Your transaction could not be completed.</p>
    
    <div class="reason-text">
        <strong>Reason:</strong> {{ reason }}
    </div>

    <div class="detail-row">
        <span class="detail-label">Reference ID</span>
        <span class="detail-val">REF{{ range(100000, 999999) | random }}</span>
    </div>
    <div class="detail-row">
        <span class="detail-label">Date & Time</span>
        <span class="detail-val">{{ formatted_date }} · {{ formatted_time }}</span>
    </div>

    <div class="divider"></div>

    <button onclick="retryPayment()" class="btn-retry">
        <i data-lucide="rotate-ccw" style="width: 15px; height: 15px;"></i> Try Again
    </button>
    <button onclick="contactSupport()" class="btn-secondary">
        <i data-lucide="headphones" style="width: 15px; height: 15px;"></i> Contact Support
    </button>
    <button onclick="goToDashboard()" class="btn-secondary">
        <i data-lucide="layout-dashboard" style="width: 15px; height: 15px;"></i> Return To Dashboard
    </button>
</div>

<script>
    lucide.createIcons();

    const serviceId = "{{ service_id }}";
    const token = "{{ token }}";

    function retryPayment() {
        if (serviceId) {
            window.location.href = `/payments/bill-summary?service_id=${serviceId}&token=${token}`;
        } else {
            window.location.href = "http://localhost:5173/dashboard";
        }
    }

    function contactSupport() {
        alert("Support ticket created. Our representative will contact you shortly.");
    }

    function goToDashboard() {
        window.location.href = "http://localhost:5173/dashboard";
    }
</script>
</body>
</html>
