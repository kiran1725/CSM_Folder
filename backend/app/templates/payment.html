<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout - CarHub Connect</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0f1a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .checkout-box {
            background: #0d1521;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(59, 130, 246, 0.1);
            border-left-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 24px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        h3 {
            font-weight: 700;
            font-size: 18px;
            color: #f1f5f9;
            margin-bottom: 8px;
        }
        p {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 24px;
        }
        .security-badge {
            background: rgba(16, 185, 129, 0.06);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #10b981;
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 12px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
    </style>
</head>
<body>

<div class="checkout-box">
    <div class="spinner"></div>
    <h3 id="checkout-status">Connecting to Payment Gateway</h3>
    <p id="checkout-desc">Please do not refresh this page or click back. We are preparing a secure connection to Razorpay.</p>
    <div class="security-badge">
        <i data-lucide="shield-check" style="width: 15px; height: 15px;"></i> 256-bit SSL Encrypted Transaction
    </div>
</div>

<!-- Razorpay Checkout Script -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
    lucide.createIcons();

    const serviceId = parseInt("{{ service_id }}");
    const token = "{{ token }}";
    const razorpayKeyId = "{{ razorpay_key_id }}";
    const totalAmount = parseFloat("{{ amount }}");
    
    const customerName = "{{ customer.name }}";
    const customerEmail = "{{ customer.email }}";
    const customerPhone = "{{ customer.phone or '' }}";
    const serviceType = "{{ service_type }}";

    window.onload = function() {
        initiateCheckout();
    };

    async function initiateCheckout() {
        try {
            document.getElementById("checkout-status").innerText = "Creating Secure Order";
            // 1. Create Order on backend
            const response = await fetch('/payments/create-order', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ service_id: serviceId })
            });

            if (!response.ok) {
                const errData = await response.json();
                throw new Error(errData.detail || "Failed to create order");
            }

            const order = await response.json();
            
            document.getElementById("checkout-status").innerText = "Opening Payment Gateway";

            // 2. Setup Razorpay options
            const options = {
                key: razorpayKeyId,
                amount: Math.round(order.amount * 100), // paise
                currency: order.currency,
                name: "CarHub Connect",
                description: `${serviceType} Payment`,
                image: "https://ui-avatars.com/api/?name=CarHub+Connect&background=3b82f6&color=fff&size=128",
                order_id: order.order_id,
                handler: async function (resp) {
                    document.getElementById("checkout-status").innerText = "Verifying Transaction";
                    document.getElementById("checkout-desc").innerText = "Please wait, we are confirming your signature with bank systems.";
                    
                    try {
                        const verifyRes = await fetch('/payments/verify', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${token}`
                            },
                            body: JSON.stringify({
                                razorpay_order_id: resp.razorpay_order_id,
                                razorpay_payment_id: resp.razorpay_payment_id,
                                razorpay_signature: resp.razorpay_signature
                            })
                        });

                        if (!verifyRes.ok) {
                            const errVal = await verifyRes.json();
                            throw new Error(errVal.detail || "Verification failed");
                        }

                        const verifyData = await verifyRes.json();
                        // Redirect to success screen
                        window.location.href = `/payments/success?payment_id=${verifyData.payment_id}&token=${token}`;
                    } catch (verifyError) {
                        window.location.href = `/payments/failed?reason=${encodeURIComponent(verifyError.message)}&service_id=${serviceId}&token=${token}`;
                    }
                },
                prefill: {
                    name: customerName,
                    email: customerEmail,
                    contact: customerPhone
                },
                theme: {
                    color: "#3b82f6"
                },
                modal: {
                    backdropclose: false,
                    escape: true,
                    ondismiss: function() {
                        window.location.href = `/payments/failed?reason=Payment cancelled by user&service_id=${serviceId}&token=${token}`;
                    }
                }
            };

            const rzp = new Razorpay(options);
            
            rzp.on('payment.failed', function (resp) {
                const desc = resp.error.description || "Payment transaction failed";
                window.location.href = `/payments/failed?reason=${encodeURIComponent(desc)}&service_id=${serviceId}&token=${token}`;
            });

            rzp.open();
        } catch (error) {
            console.error(error);
            window.location.href = `/payments/failed?reason=${encodeURIComponent(error.message)}&service_id=${serviceId}&token=${token}`;
        }
    }
</script>
</body>
</html>
